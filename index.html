<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ListenApp - English Listening MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ====== 视频区域：上 1/3 ====== */
    #video-section {
      flex: 1;
      background: #000;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video-section video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* 播放按钮覆盖层 */
    #play-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      cursor: pointer;
      transition: opacity 0.3s;
      z-index: 10;
    }
    #play-overlay.hidden { opacity: 0; pointer-events: none; }
    #play-overlay .icon { font-size: 60px; }

    /* 进度条 */
    #progress-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      z-index: 11;
    }
    #progress-fill {
      height: 100%;
      background: #e94560;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* 时间显示 */
    #time-display {
      position: absolute;
      bottom: 10px; right: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      z-index: 12;
    }

    /* ====== 分隔线 ====== */
    #divider {
      height: 2px;
      background: linear-gradient(90deg, #e94560, #0f3460, #e94560);
    }

    /* ====== 字幕区域：下 2/3 ====== */
    #subtitle-section {
      flex: 2;
      background: #16213e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #subtitle-header {
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a4a;
      font-size: 13px;
      color: #888;
      flex-shrink: 0;
    }

    #subtitle-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .subtitle-item {
      display: flex;
      align-items: flex-start;
      padding: 12px 16px;
      margin: 3px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
    }

    .subtitle-item:active {
      transform: scale(0.98);
    }

    .subtitle-item.active {
      background: #0f3460;
      border-left-color: #e94560;
    }

    .subtitle-item .time {
      color: #666;
      font-size: 12px;
      min-width: 36px;
      margin-right: 10px;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    .subtitle-item .text {
      color: #999;
      font-size: 16px;
      line-height: 1.5;
      flex: 1;
      transition: all 0.3s ease;
    }

    .subtitle-item.active .time {
      color: #e94560;
    }

    .subtitle-item.active .text {
      color: #fff;
      font-size: 17px;
      font-weight: 600;
    }

    /* 中文翻译 */
    .subtitle-item .zh {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.4;
    }
    .subtitle-item.active .zh {
      color: #aaa;
    }

    /* 滚动条美化 */
    #subtitle-list::-webkit-scrollbar { width: 4px; }
    #subtitle-list::-webkit-scrollbar-track { background: transparent; }
    #subtitle-list::-webkit-scrollbar-thumb { 
      background: #333; 
      border-radius: 2px; 
    }

    /* ====== 底部控制栏 ====== */
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      background: #0a0a1a;
      gap: 20px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid #444;
      color: #ccc;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ctrl-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }
    .ctrl-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- 视频 -->
  <div id="video-section">
    <video id="video" preload="auto">
      <source src="assets/video/ted_clip.mp4" type="video/mp4">
    </video>
    <div id="play-overlay" onclick="togglePlay()">
      <span class="icon">▶️</span>
    </div>
    <div id="progress-bar" onclick="seekTo(event)">
      <div id="progress-fill"></div>
    </div>
    <div id="time-display">0:00 / 0:00</div>
  </div>

  <div id="divider"></div>

  <!-- 字幕 -->
  <div id="subtitle-section">
    <div id="subtitle-header">📜 字幕 · 点击任意一句跳转播放</div>
    <div id="subtitle-list"></div>
  </div>

  <!-- 控制栏 -->
  <div id="controls">
    <button class="ctrl-btn" onclick="skip(-5)">⏪ 5s</button>
    <button class="ctrl-btn" onclick="togglePlay()" id="play-btn">▶ 播放</button>
    <button class="ctrl-btn" onclick="skip(5)">5s ⏩</button>
    <button class="ctrl-btn" onclick="toggleAutoScroll()" id="autoscroll-btn">📌 自动滚动</button>
  </div>

  <script>
    // ====== 字幕数据 ======
    const subtitles = [
      {id:0, start:0.873, end:3.507, text:"As a student of adversity,"},
      {id:1, start:4.309, end:9.617, text:"I've been struck over the years by how some people with major challenges"},
      {id:2, start:9.641, end:11.979, text:"seem to draw strength from them."},
      {id:3, start:12.649, end:16.586, text:"And I've heard the popular wisdom that that has to do with finding meaning."},
      {id:4, start:16.940, end:18.401, text:"And for a long time,"},
      {id:5, start:18.425, end:20.800, text:"I thought the meaning was out there,"},
      {id:6, start:20.824, end:23.303, text:"some great truth waiting to be found."},
      {id:7, start:23.985, end:25.535, text:"But over time,"},
      {id:8, start:25.640, end:28.103, text:"I've come to feel that the truth is irrelevant."},
      {id:9, start:28.593, end:30.776, text:'We call it "finding meaning,"'},
      {id:10, start:30.800, end:34.102, text:'but we might better call it "forging meaning."'},
      {id:11, start:34.983, end:37.928, text:"My last book was about how families manage to deal"},
      {id:12, start:37.952, end:41.663, text:"with various kinds of challenging or unusual offspring."},
      {id:13, start:42.303, end:44.470, text:"And one of the mothers I interviewed,"},
      {id:14, start:44.494, end:47.457, text:"who had two children with multiple severe disabilities,"},
      {id:15, start:47.481, end:52.178, text:'said to me, "People always give us these little sayings like,'},
      {id:16, start:52.202, end:55.077, text:"'God doesn\'t give you any more than you can handle.'"},
      {id:17, start:55.789, end:60.216, text:"But children like ours are not preordained as a gift."},
    ];

    const video = document.getElementById('video');
    const subtitleList = document.getElementById('subtitle-list');
    const progressFill = document.getElementById('progress-fill');
    const timeDisplay = document.getElementById('time-display');
    const playOverlay = document.getElementById('play-overlay');
    const playBtn = document.getElementById('play-btn');
    const autoscrollBtn = document.getElementById('autoscroll-btn');

    let currentIndex = -1;
    let autoScroll = true;
    let userScrollTimer = null;

    // ====== 渲染字幕列表 ======
    function renderSubtitles() {
      subtitleList.innerHTML = subtitles.map(s => `
        <div class="subtitle-item" id="sub-${s.id}" onclick="jumpTo(${s.id})">
          <span class="time">${formatTime(s.start)}</span>
          <div>
            <div class="text">${s.text}</div>
          </div>
        </div>
      `).join('');
    }

    // ====== 时间格式化 ======
    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // ====== 播放/暂停 ======
    function togglePlay() {
      if (video.paused) {
        video.play();
        playOverlay.classList.add('hidden');
        playBtn.textContent = '⏸ 暂停';
      } else {
        video.pause();
        playOverlay.classList.remove('hidden');
        playOverlay.querySelector('.icon').textContent = '▶️';
        playBtn.textContent = '▶ 播放';
      }
    }

    // ====== 跳转到字幕位置 ======
    function jumpTo(id) {
      const s = subtitles[id];
      video.currentTime = s.start;
      if (video.paused) video.play();
      playOverlay.classList.add('hidden');
      playBtn.textContent = '⏸ 暂停';
      autoScroll = true;
      updateAutoScrollBtn();
    }

    // ====== 快进/快退 ======
    function skip(seconds) {
      video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
    }

    // ====== 进度条点击 ======
    function seekTo(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      video.currentTime = ratio * video.duration;
    }

    // ====== 自动滚动开关 ======
    function toggleAutoScroll() {
      autoScroll = !autoScroll;
      updateAutoScrollBtn();
    }
    function updateAutoScrollBtn() {
      autoscrollBtn.className = autoScroll ? 'ctrl-btn active' : 'ctrl-btn';
      autoscrollBtn.textContent = autoScroll ? '📌 自动滚动' : '📌 手动模式';
    }

    // ====== 用户手动滚动检测 ======
    subtitleList.addEventListener('scroll', () => {
      if (userScrollTimer) clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => {
        // 3秒后恢复自动滚动
      }, 3000);
    }, { passive: true });

    subtitleList.addEventListener('touchstart', () => {
      autoScroll = false;
      updateAutoScrollBtn();
      if (userScrollTimer) clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => {
        autoScroll = true;
        updateAutoScrollBtn();
      }, 5000);
    }, { passive: true });

    // ====== 视频进度更新 → 同步字幕 ======
    video.addEventListener('timeupdate', () => {
      const t = video.currentTime;
      const dur = video.duration || 1;

      // 更新进度条
      progressFill.style.width = (t / dur * 100) + '%';
      timeDisplay.textContent = `${formatTime(t)} / ${formatTime(dur)}`;

      // 找到当前字幕
      let idx = 0;
      for (let i = subtitles.length - 1; i >= 0; i--) {
        if (t >= subtitles[i].start) { idx = i; break; }
      }

      if (idx !== currentIndex) {
        // 取消旧高亮
        if (currentIndex >= 0) {
          document.getElementById(`sub-${currentIndex}`)?.classList.remove('active');
        }
        // 高亮新字幕
        currentIndex = idx;
        const el = document.getElementById(`sub-${idx}`);
        if (el) {
          el.classList.add('active');
          // 自动滚动
          if (autoScroll) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }
    });

    // ====== 视频事件 ======
    video.addEventListener('ended', () => {
      playOverlay.classList.remove('hidden');
      playOverlay.querySelector('.icon').textContent = '🔄';
      playBtn.textContent = '▶ 播放';
    });

    video.addEventListener('loadedmetadata', () => {
      timeDisplay.textContent = `0:00 / ${formatTime(video.duration)}`;
    });

    // ====== 初始化 ======
    renderSubtitles();
    updateAutoScrollBtn();
  </script>
</body>
</html>
